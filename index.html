<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; worker-src 'self' blob:;">
  <title>MD Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/renderer/styles/index.css">
  <link rel="stylesheet" href="node_modules/highlight.js/styles/github-dark.min.css" id="hljs-dark">
  <link rel="stylesheet" href="node_modules/highlight.js/styles/github.min.css" id="hljs-light" disabled>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/index.js"></script>
  <script src="node_modules/pdfjs-dist/build/pdf.min.js"></script>
</head>
<body>
  <div class="app-container">
    <!-- Title Bar (drag region) -->
    <div class="titlebar" id="titlebar">
      <div class="titlebar-drag-region"></div>
      <div class="titlebar-title" id="titlebarTitle">MD Reader</div>
    </div>

    <div class="workbench">
      <!-- Activity Bar (leftmost icon strip) -->
      <div class="activity-bar" id="activityBar">
        <div class="activity-bar-top">
          <button class="activity-bar-item active" id="activityExplorer" data-panel="explorer" title="资源管理器">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
            </svg>
          </button>
          <button class="activity-bar-item" id="activityOutline" data-panel="outline" title="大纲">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="6" y1="12" x2="21" y2="12"></line>
              <line x1="9" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="activity-bar-bottom">
          <button class="activity-bar-item" id="toggleThemeBtn" title="切换主题">
            <svg class="theme-icon-dark" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg class="theme-icon-light" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>

        </div>
      </div>

      <!-- Primary Sidebar -->
      <div class="primary-sidebar" id="primarySidebar">
        <!-- Explorer Panel -->
        <div class="sidebar-panel" id="panelExplorer">
          <div class="sidebar-panel-header">
            <span class="sidebar-panel-title">资源管理器</span>
            <div class="sidebar-panel-actions">
              <button class="action-btn" id="openFileBtn" title="打开文件">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                  <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
              </button>
              <button class="action-btn" id="clearHistoryBtn" title="清空历史">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
              </button>
            </div>
          </div>
          <div class="sidebar-section">
            <div class="sidebar-section-header" id="recentFilesToggle">
              <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
              <span>最近打开的文件</span>
            </div>
            <div class="sidebar-section-body" id="historyList">
              <div class="empty-state-sm">
                <p>暂无浏览记录</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Outline Panel (in sidebar mode) -->
        <div class="sidebar-panel hidden" id="panelOutline">
          <div class="sidebar-panel-header">
            <span class="sidebar-panel-title">大纲</span>
          </div>
          <nav id="tocListSidebar" class="toc-list-sidebar">
            <div class="empty-state-sm">
              <p>打开文件后显示大纲</p>
            </div>
          </nav>
        </div>
      </div>

      <!-- Sidebar Resize Handle -->
      <div class="sash sash-sidebar hidden" id="sidebarSash"></div>

      <!-- Editor Area -->
      <div class="editor-area">
        <!-- Editor Tabs -->
        <div class="editor-tabs" id="editorTabs">
          <div class="editor-tabs-scroll">
            <!-- 标签页由 tab.js 动态渲染 -->
            <div class="editor-tab active" data-tab-id="welcome">
              <span class="editor-tab-icon">📖</span>
              <span class="editor-tab-label">Welcome</span>
            </div>
          </div>
        </div>

        <!-- Breadcrumb Bar -->
        <div class="breadcrumb-bar" id="breadcrumbBar">
          <span id="currentPath" class="breadcrumb-text">MD Reader</span>
          <div class="breadcrumb-actions">
            <button class="mode-toggle-btn hidden" id="modeToggleBtn" title="切换源码模式">
              <svg class="icon-source" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="16 18 22 12 16 6"></polyline>
                <polyline points="8 6 2 12 8 18"></polyline>
              </svg>
              <span class="mode-label">源码</span>
            </button>
          </div>
        </div>

        <!-- Editor Content -->
        <div id="content" class="editor-content">
          <div class="welcome">
            <h1>MD Reader</h1>

            <div class="welcome-actions">
              <button class="welcome-btn" id="welcomeOpenBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                  <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                打开文件
              </button>
            </div>

            <div class="welcome-shortcuts">
              <div class="welcome-shortcut-row">
                <span class="welcome-shortcut-label">打开文件</span>
                <kbd>⌘ O</kbd>
              </div>
              <div class="welcome-shortcut-row">
                <span class="welcome-shortcut-label">保存文件</span>
                <kbd>⌘ S</kbd>
              </div>
              <div class="welcome-shortcut-row">
                <span class="welcome-shortcut-label">切换侧栏</span>
                <kbd>⌘ B</kbd>
              </div>
              <div class="welcome-shortcut-row">
                <span class="welcome-shortcut-label">资源管理器</span>
                <kbd>⌘ ⇧ E</kbd>
              </div>
            </div>

            <p class="welcome-hint">拖拽 .md / .txt / .pdf 文件到窗口即可打开</p>
          </div>
        </div>
      </div>

      <!-- Outline Sash -->
      <div class="sash sash-outline hidden" id="outlineSash"></div>

      <!-- Outline Panel (right side, shown when clicking outline in activity bar) -->
      <div class="outline-panel hidden" id="outlinePanel">
        <div class="outline-panel-header">
          <span class="outline-panel-title">大纲</span>
          <button class="action-btn" id="closeOutlineBtn" title="关闭">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <nav id="tocList" class="outline-toc-list">
          <div class="empty-state-sm">
            <p>打开文件后显示大纲</p>
          </div>
        </nav>
      </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">
      <div class="status-bar-left">
        <span class="status-item" id="statusFileInfo">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
          就绪
        </span>
      </div>
      <div class="status-bar-right">
        <span class="status-item" id="statusWordCount">字数: --</span>
        <span class="status-item" id="statusEncoding">UTF-8</span>
        <span class="status-item" id="statusType">--</span>
      </div>
    </div>
  </div>

  <script type="module" src="src/renderer/index.js"></script>
</body>
</html>
