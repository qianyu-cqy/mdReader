name: Build & Release

# 触发条件：推送 v 开头的 tag（如 v1.0.0）或手动触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 需要写入 Release 的权限
permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_cmd: npm run build:mac
          - os: windows-latest
            build_cmd: npm run build:win

    runs-on: ${{ matrix.os }}

    steps:
      # 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 安装 Python 3.11（node-gyp 编译原生模块需要，Python 3.12+ 移除了 distutils）
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 安装依赖（--ignore-optional 跳过 canvas 等可选原生模块）
      - name: Install dependencies
        run: npm ci --ignore-optional

      # 打包（不传 GH_TOKEN，避免 electron-builder 自动上传到 Release，上传由 release job 统一处理）
      - name: Build
        run: ${{ matrix.build_cmd }}
        env:
          # macOS: 跳过代码签名和公证（无 Apple 开发者账号时必须）
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # 上传构建产物（只保留安装包）
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            !dist/*.blockmap
          if-no-files-found: ignore

  # 发布 Release（仅 tag 触发时）
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      # 下载所有构建产物
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-macos-latest
          path: release-assets/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-windows-latest
          path: release-assets/

      # 列出文件（调试用）
      - name: List release assets
        run: ls -lhR release-assets/

      # 创建 GitHub Release 并上传安装包
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.exe
            !release-assets/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
